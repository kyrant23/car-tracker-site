<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car Sales Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
<style>
  :root {
    --bg: #1a1d23;
    --bg-card: #242830;
    --bg-card-hover: #2a2f38;
    --border: #383d47;
    --text-primary: #e8e9ec;
    --text-secondary: #9ca3af;
    --text-tertiary: #6b7280;
    --accent: #5b8def;
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.15);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.15);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.15);
    --gray-bg: rgba(156,163,175,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  h1, h2, h3 { font-weight: 500; margin: 0; }
  input, select {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 13px;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-tertiary); }
  button {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  button:hover { background: var(--bg-card-hover); }
  .c-green { background: var(--green-bg); color: var(--green); }
  .c-amber { background: var(--amber-bg); color: var(--amber); }
  .c-red { background: var(--red-bg); color: var(--red); }
  .c-gray { background: var(--gray-bg); color: var(--text-secondary); }
  .accentBtn { background: var(--accent); color: #fff; border-color: transparent; }
  .accentBtn:hover { background: #4a7fe0; }
  .dangerText { color: var(--red); }

  #shell { display: flex; min-height: 100vh; }
  #sidebar {
    width: 200px; flex-shrink: 0; background: var(--bg-card);
    border-right: 1px solid var(--border); padding: 1.25rem 0.85rem;
    display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh;
  }
  #sidebar .navBtn {
    display: flex; align-items: center; gap: 10px; justify-content: flex-start;
    background: transparent; border: none; padding: 9px 10px; width: 100%;
    color: var(--text-secondary); font-size: 14px; border-radius: 8px;
  }
  #sidebar .navBtn.active { background: rgba(91,141,239,0.15); color: var(--accent); }
  #sidebar .navBtn:hover { background: var(--bg-card-hover); }
  #main { flex: 1; padding: 1.5rem 2rem; max-width: 1100px; }

  .metricCard {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
  }
  .itemCard {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
    cursor: pointer;
  }
  .itemCard:hover { background: var(--bg-card-hover); }
  .cardGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  #connStatus { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-tertiary); margin-bottom: 1rem; }
  #connStatus .dot { width:8px; height:8px; border-radius:50%; background: var(--text-tertiary); }
  #connStatus.connected .dot { background: var(--green); }
  #connStatus.error .dot { background: var(--red); }
</style>
</head>
<body>

<div id="shell" style="display:none;">
  <div id="sidebar">
    <p style="font-size:13px; font-weight:500; padding:0 0.4rem; margin:0 0 1.25rem;">Car tracker</p>
    <button class="navBtn active" id="navDashboard"><i class="ti ti-layout-dashboard" aria-hidden="true" style="font-size:17px;"></i>Dashboard</button>
    <button class="navBtn" id="navCars"><i class="ti ti-car" aria-hidden="true" style="font-size:17px;"></i>Cars</button>
    <button class="navBtn" id="navSales"><i class="ti ti-receipt" aria-hidden="true" style="font-size:17px;"></i>Sales</button>
    <div style="flex:1;"></div>
    <div style="border-top:1px solid var(--border); padding-top:12px; margin-top:12px;">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">
        <label style="font-size:12px; color:var(--text-secondary);">Tax %</label>
        <input type="number" id="taxRate" min="0" max="100" step="0.1" value="15" style="width:56px; text-align:right;" />
      </div>
      <div id="userArea" style="font-size:13px; color:var(--text-secondary);"></div>
    </div>
  </div>

  <div id="main">
    <div id="connStatus"><span class="dot"></span><span id="connStatusText">Connecting...</span></div>

    <div id="dashboardPage">
      <h1 style="margin-bottom:1.25rem;">Dashboard</h1>
      <div class="cardGrid" id="dashMetrics" style="margin-bottom:2rem;"></div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
        <h2>On-hand cars</h2>
        <button id="dashSeeCars" style="font-size:12px;">See all<i class="ti ti-arrow-right" aria-hidden="true" style="font-size:13px; margin-left:4px; vertical-align:-1px;"></i></button>
      </div>
      <div class="cardGrid" id="dashCarCards" style="margin-bottom:2rem;"></div>
      <p id="dashCarsEmpty" style="display:none; color:var(--text-secondary); margin-bottom:2rem;">No cars on hand.</p>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
        <h2>Recent sales</h2>
        <button id="dashSeeSales" style="font-size:12px;">See all<i class="ti ti-arrow-right" aria-hidden="true" style="font-size:13px; margin-left:4px; vertical-align:-1px;"></i></button>
      </div>
      <div class="cardGrid" id="dashSaleCards"></div>
      <p id="dashSalesEmpty" style="display:none; color:var(--text-secondary);">No sales yet.</p>
    </div>

    <div id="carsPage" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
        <h1>Cars</h1>
        <button id="addCarBtn" class="accentBtn" style="display:flex; align-items:center; gap:6px;"><i class="ti ti-plus" aria-hidden="true"></i>Add car</button>
      </div>
      <div class="cardGrid" id="carMetrics" style="margin-bottom:1.5rem;"></div>
      <div class="cardGrid" id="carCards"></div>
      <p id="carsEmpty" style="display:none; color:var(--text-secondary); padding:1.5rem 0;">No cars yet. Add one above.</p>
    </div>

    <div id="salesPage" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
        <h1>Sales</h1>
        <button id="addSaleBtn" class="accentBtn" style="display:flex; align-items:center; gap:6px;"><i class="ti ti-plus" aria-hidden="true"></i>Add sale</button>
      </div>
      <div class="cardGrid" id="saleMetrics" style="margin-bottom:1.5rem;"></div>
      <div class="cardGrid" id="saleCards"></div>
      <p id="salesEmpty" style="display:none; color:var(--text-secondary); padding:1.5rem 0;">No sales yet. Add one above.</p>
    </div>
  </div>
</div>

<div id="modalRoot"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    sendEmailVerification, onAuthStateChanged, signOut, setPersistence,
    browserLocalPersistence, GoogleAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjiwMuOXVmJulh8zQjfZlwiiO7zy3N1rI",
    authDomain: "turners-car-7ccdd.firebaseapp.com",
    projectId: "turners-car-7ccdd",
    storageBucket: "turners-car-7ccdd.firebasestorage.app",
    messagingSenderId: "929200136121",
    appId: "1:929200136121:web:732e7e19678d7932f4a068"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const auth = getAuth(fbApp);
  setPersistence(auth, browserLocalPersistence);
  const googleProvider = new GoogleAuthProvider();

  function workspaceDocRef(teamCode){
    return doc(db, "workspaces", teamCode);
  }
  function userMetaRef(uid){
    return doc(db, "userMeta", uid);
  }
  function inviteRef(inviteCode){
    return doc(db, "invites", inviteCode);
  }

  window.__fbAuth = {
    async signUp(email, password){
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await sendEmailVerification(cred.user);
      return cred.user;
    },
    async signIn(email, password){
      const cred = await signInWithEmailAndPassword(auth, email, password);
      return cred.user;
    },
    async signInWithGoogle(){
      const cred = await signInWithPopup(auth, googleProvider);
      const isNewUser = cred._tokenResponse && cred._tokenResponse.isNewUser;
      return { user: cred.user, isNewUser: !!isNewUser };
    },
    async resendVerification(){
      if (auth.currentUser) await sendEmailVerification(auth.currentUser);
    },
    async signOut(){ await signOut(auth); },
    onState(callback){
      return onAuthStateChanged(auth, (user)=>{
        callback(user);
      });
    },
    async reloadUser(){
      if (auth.currentUser) await auth.currentUser.reload();
      return auth.currentUser;
    },
    getCurrentUser(){ return auth.currentUser; }
  };

  window.__fb = {
    async getUserMeta(uid){
      const snap = await getDoc(userMetaRef(uid));
      return snap.exists() ? snap.data() : null;
    },
    async setUserMeta(uid, data){
      await setDoc(userMetaRef(uid), data, { merge: true });
    },
    async getWorkspaceData(teamCode){
      const snap = await getDoc(workspaceDocRef(teamCode));
      return snap.exists() ? snap.data() : null;
    },
    async setWorkspaceData(teamCode, data){
      await setDoc(workspaceDocRef(teamCode), data, { merge: true });
    },
    listenWorkspace(teamCode, callback){
      return onSnapshot(workspaceDocRef(teamCode), (snap)=>{
        callback(snap.exists() ? snap.data() : null);
      }, (err)=>{
        console.error("Firestore listen error", err);
        window.__fbError && window.__fbError(err);
      });
    },
    async createInvite(inviteCode, teamCode, ownerUid){
      await setDoc(inviteRef(inviteCode), { teamCode, ownerUid, createdAt: Date.now() });
    },
    async getInvite(inviteCode){
      const snap = await getDoc(inviteRef(inviteCode));
      return snap.exists() ? snap.data() : null;
    },
    async deleteInvite(inviteCode){
      await deleteDoc(inviteRef(inviteCode));
    }
  };
  window.__fbReady && window.__fbReady();
</script>

<script>
(function(){
  const fmt = n => '$' + Number(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  let cars = [];
  let sales = [];
  let taxRate = 15;
  let currentUser = null;       // Firebase Auth user object
  let currentTeamCode = null;   // which workspace doc this user belongs to
  let currentWorkspaceOwnerUid = null;
  let fbConnected = false;
  let suppressNextSnapshot = false;
  let currentPage = 'dashboard';
  let workspaceUnsub = null;

  function setConnStatus(state, text){
    const el = document.getElementById('connStatus');
    el.className = state;
    document.getElementById('connStatusText').textContent = text;
  }

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
  function newId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
  function carLabel(c){ return [c.make,c.model].filter(Boolean).join(' ') || ''; }
  function isSold(s){ return Number(s.soldPrice||0) > 0; }

  function generateTeamCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
    let code = '';
    for (let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
    return code;
  }

  function setupBackdropClose(modal, panelSelector){
    let downOnBackdrop = false;
    const panel = modal.querySelector(panelSelector);
    modal.addEventListener('mousedown', (e)=>{ downOnBackdrop = !panel.contains(e.target); });
    modal.addEventListener('mouseup', (e)=>{
      const upOnBackdrop = !panel.contains(e.target);
      if (downOnBackdrop && upOnBackdrop) modal.remove();
      downOnBackdrop = false;
    });
  }

  function expiryStatus(dateStr){
    if (!dateStr) return {label:'Unknown', cls:'c-gray'};
    const exp = new Date(dateStr);
    const today = new Date(todayStr());
    const diffDays = Math.ceil((exp-today)/86400000);
    if (diffDays < 0) return {label:'Expired', cls:'c-red'};
    if (diffDays <= 30) return {label:'Expiring soon', cls:'c-amber'};
    return {label:'Valid', cls:'c-green'};
  }

  function carExpenseTotal(c){ return (c.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0); }
  function carIsSold(rego){ return sales.some(s=>s.rego===rego && isSold(s)); }
  function carByRego(rego){ return cars.find(c=>c.rego===rego); }

  function badge(dateStr){
    const st = expiryStatus(dateStr);
    return `<span class="${st.cls}" style="display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px;">${st.label}</span>`;
  }

  const LOCAL_CACHE_KEY = 'car-sales-cloud:cache';

  function applyData(data){
    if (!data) return;
    cars = data.cars || [];
    sales = data.sales || [];
    taxRate = data.taxRate !== undefined ? data.taxRate : 15;
    currentWorkspaceOwnerUid = data.ownerUid || currentWorkspaceOwnerUid;
    cars.forEach(c=>{
      if(!c.expenses) c.expenses=[];
      if(c.regoExpiry===undefined) c.regoExpiry='';
      if(c.cost===undefined) c.cost = c.cost||0;
    });
    sales.forEach(s=>{
      if(s.soldPrice===undefined) s.soldPrice = s.price||0;
      if(s.cif===undefined) s.cif=false;
      if(s.sa===undefined) s.sa=false;
      if(s.cifImage===undefined) s.cifImage='';
      if(s.saImage===undefined) s.saImage='';
    });
    document.getElementById('taxRate').value = taxRate;
  }

  function snapshot(){ return { cars, sales, taxRate }; }

  async function persist(){
    if (!currentTeamCode) return;
    const data = snapshot();
    try { localStorage.setItem(LOCAL_CACHE_KEY+':'+currentTeamCode, JSON.stringify(data)); } catch(e){}
    if (window.__fb && fbConnected){
      try {
        suppressNextSnapshot = true;
        await window.__fb.setWorkspaceData(currentTeamCode, data);
      } catch(e){
        console.error('Cloud save failed', e);
        setConnStatus('error', 'Save failed — check connection');
      }
    }
  }

  function loadLocalCache(teamCode){
    try {
      const v = localStorage.getItem(LOCAL_CACHE_KEY+':'+teamCode);
      if (v) applyData(JSON.parse(v));
    } catch(e){}
  }

  function showApp(){
    document.getElementById('modalRoot').innerHTML = '';
    const shell = document.getElementById('shell');
    if (shell) shell.style.display = 'flex';
    renderUserArea();
    render();
  }

  function showGate(mode){
    const shell = document.getElementById('shell');
    if (shell) shell.style.display = 'none';
    document.getElementById('modalRoot').innerHTML = '';
    if (mode === 'verify') openVerifyGate();
    else openAuthGate();
  }

  async function enterWorkspace(teamCode){
    currentTeamCode = teamCode;
    loadLocalCache(teamCode);
    setConnStatus('', 'Connecting...');
    try {
      const data = await window.__fb.getWorkspaceData(teamCode);
      if (data){ applyData(data); }
      else { await window.__fb.setWorkspaceData(teamCode, snapshot()); }
      fbConnected = true;
      setConnStatus('connected', 'Synced — shared live with your team');
      showApp();

      if (workspaceUnsub) workspaceUnsub();
      workspaceUnsub = window.__fb.listenWorkspace(teamCode, (data)=>{
        if (suppressNextSnapshot){ suppressNextSnapshot = false; return; }
        if (data){
          applyData(data);
          if (document.getElementById('shell').style.display !== 'none'){ render(); }
        }
      });
    } catch(e){
      console.error(e);
      setConnStatus('error', 'Could not connect to cloud — using local data only');
      showApp();
    }
  }

  let routingInProgress = false;

  async function routeAuthenticatedUser(user){
    currentUser = user;
    if (!user){
      if (workspaceUnsub){ workspaceUnsub(); workspaceUnsub = null; }
      currentTeamCode = null;
      showGate();
      return;
    }
    if (!user.emailVerified){
      showGate('verify');
      return;
    }
    if (routingInProgress) return; // avoid duplicate work if both the listener and a direct call fire
    routingInProgress = true;
    try {
      const meta = await window.__fb.getUserMeta(user.uid);
      if (meta && meta.teamCode){
        await enterWorkspace(meta.teamCode);
      } else {
        // first-time sign-in with no workspace yet (e.g. first Google sign-in) — create one silently
        const teamCode = generateTeamCode();
        await window.__fb.setUserMeta(user.uid, {teamCode, email: user.email, ownerUid: user.uid});
        await window.__fb.setWorkspaceData(teamCode, {ownerUid: user.uid});
        await enterWorkspace(teamCode);
      }
    } catch(e){
      console.error(e);
      setConnStatus('error', 'Could not load your workspace');
    }
    routingInProgress = false;
  }

  // ---- Auth state wiring ----
  function initAuthListener(){
    window.__fbError = ()=>{ setConnStatus('error', 'Cloud connection error'); };
    window.__fbReady = ()=>{
      window.__fbAuth.onState((user)=>{
        routeAuthenticatedUser(user);
      });
    };
    if (window.__fbAuth) window.__fbReady();
  }

  function load(){
    document.getElementById('shell').style.display = 'none';
    setConnStatus('', 'Connecting...');
    initAuthListener();
  }

  function renderUserArea(){
    const el = document.getElementById('userArea');
    if (currentUser){
      const isOwner = currentWorkspaceOwnerUid === currentUser.uid;
      el.innerHTML = `<p style="margin:0 0 4px;">Signed in as<br><strong style="color:var(--text-primary); word-break:break-all;">${escapeHtml(currentUser.email)}</strong></p>
        ${isOwner
          ? `<button id="inviteBtn" style="width:100%; font-size:12px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:6px;"><i class="ti ti-user-plus" aria-hidden="true" style="font-size:14px;"></i>Invite someone</button>`
          : `<p style="font-size:11px; color:var(--text-tertiary); margin:0 0 8px;">Viewing a shared dataset</p>`
        }
        <button id="joinBtn" style="width:100%; font-size:12px; margin-bottom:8px;">Join a shared workspace</button>
        <button id="logoutBtn" style="width:100%; font-size:12px;">Log out</button>`;
      document.getElementById('logoutBtn').addEventListener('click', async ()=>{
        await window.__fbAuth.signOut();
      });
      document.getElementById('joinBtn').addEventListener('click', openJoinModal);
      if (isOwner){
        document.getElementById('inviteBtn').addEventListener('click', openInviteModal);
      }
    } else {
      el.innerHTML = `<p style="font-size:12px; color:var(--text-tertiary); margin:0;">Not signed in</p>`;
    }
  }

  function openInviteModal(){
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:30;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:380px; color:var(--text-primary);">
        <h2 style="margin:0 0 0.75rem;">Invite someone</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin:0 0 1.25rem;">Generate a one-time code. Share it with the person you want to give access to your data — they'll enter it after signing in to their own account.</p>
        <div id="inv_content">
          <button id="inv_generate" class="accentBtn" style="width:100%;">Generate invite code</button>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-top:1.5rem;">
          <button id="inv_close">Close</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#inv_close').addEventListener('click', ()=>modal.remove());
    modal.querySelector('#inv_generate').addEventListener('click', async ()=>{
      const btn = modal.querySelector('#inv_generate');
      btn.disabled = true;
      try {
        const inviteCode = generateTeamCode();
        await window.__fb.createInvite(inviteCode, currentTeamCode, currentUser.uid);
        modal.querySelector('#inv_content').innerHTML = `
          <p style="font-size:13px; color:var(--text-secondary); margin:0 0 8px;">Share this code — it can only be used once:</p>
          <p style="font-size:28px; font-weight:600; letter-spacing:2px; text-align:center; margin:0 0 8px; padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--border);">${inviteCode}</p>
          <button id="inv_copy" style="width:100%;">Copy code</button>
        `;
        modal.querySelector('#inv_copy').addEventListener('click', ()=>{
          navigator.clipboard.writeText(inviteCode).catch(()=>{});
          modal.querySelector('#inv_copy').textContent = 'Copied!';
          setTimeout(()=>{ modal.querySelector('#inv_copy').textContent = 'Copy code'; }, 1500);
        });
      } catch(e){
        console.error(e);
        modal.querySelector('#inv_content').innerHTML = `<p style="font-size:13px; color:var(--red); margin:0;">Could not generate an invite code. Please try again.</p>`;
      }
    });
  }

  function openJoinModal(){
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:30;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:380px; color:var(--text-primary);">
        <h2 style="margin:0 0 0.75rem;">Join a shared workspace</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin:0 0 1.25rem;">Enter the invite code someone gave you. This will switch your account to view and edit their data instead of your own.</p>
        <label style="font-size:13px; color:var(--text-secondary);">Invite code
          <input type="text" id="jn_code" style="width:100%; margin-top:4px; text-transform:uppercase;" placeholder="e.g. AB12CD" />
        </label>
        <p id="jn_err" style="font-size:13px; color:var(--red); margin:0.75rem 0 0; display:none;"></p>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          <button id="jn_cancel">Cancel</button>
          <button id="jn_submit" class="accentBtn">Join</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#jn_cancel').addEventListener('click', ()=>modal.remove());

    const submit = async ()=>{
      const code = modal.querySelector('#jn_code').value.trim().toUpperCase();
      const errEl = modal.querySelector('#jn_err');
      errEl.style.display = 'none';
      if (!code){ errEl.textContent='Enter an invite code.'; errEl.style.display='block'; return; }
      const btn = modal.querySelector('#jn_submit');
      btn.disabled = true;
      try {
        const invite = await window.__fb.getInvite(code);
        if (!invite){
          errEl.textContent = "That invite code doesn't exist or has already been used.";
          errEl.style.display = 'block';
          btn.disabled = false;
          return;
        }
        await window.__fb.setUserMeta(currentUser.uid, {teamCode: invite.teamCode, email: currentUser.email});
        await window.__fb.deleteInvite(code);
        modal.remove();
        enterWorkspace(invite.teamCode);
      } catch(e){
        console.error(e);
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
      }
    };
    modal.querySelector('#jn_submit').addEventListener('click', submit);
    modal.querySelector('#jn_code').addEventListener('keydown', (e)=>{ if(e.key==='Enter') submit(); });
  }

            <div style="flex:1; height:1px; background:var(--border);"></div>
          </div>

            <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.5 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-2.1 14.1-5.6l-6.5-5.3C29.6 35 26.9 36 24 36c-5.3 0-9.7-3.1-11.3-7.6l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.5 5.3C41.6 35.9 44 30.4 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
            Sign in with Google
          </button>
          <p style="font-size:13px; color:var(--text-secondary); text-align:center; margin:1rem 0 0;">
            ${isSignup ? 'Already have an account?' : "Don't have an account?"}

          </p>
        </div>`;

      modal.querySelector('#au_google').addEventListener('click', async ()=>{
        const errEl = modal.querySelector('#au_err');
        errEl.style.display = 'none';
        try {
          const result = await window.__fbAuth.signInWithGoogle();
          // Don't rely solely on onAuthStateChanged — route immediately too, in case
          // the listener is slow to fire after the popup closes.
          await routeAuthenticatedUser(result.user);
        } catch(e){
          console.error(e);
          let msg = 'Google sign-in failed. Please try again.';
          if (e.code === 'auth/popup-closed-by-user') msg = 'Sign-in window was closed before finishing.';
          else if (e.code === 'auth/popup-blocked') msg = 'Your browser blocked the sign-in popup — please allow popups and try again.';
          errEl.textContent = msg;
          errEl.style.display = 'block';
        }
      });

      modal.querySelector('#au_switch').addEventListener('click', (e)=>{
        e.preventDefault();
        mode = isSignup ? 'signin' : 'signup';
        renderForm();
      });

      const submit = async ()=>{
        const email = modal.querySelector('#au_email').value.trim();
        const pass = modal.querySelector('#au_pass').value;
        const errEl = modal.querySelector('#au_err');
        errEl.style.display = 'none';
        if (!email || !pass){ errEl.textContent='Enter an email and password.'; errEl.style.display='block'; return; }
        if (pass.length < 8){ errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
        const submitBtn = modal.querySelector('#au_submit');
        submitBtn.disabled = true;
        try {
          if (isSignup){
            const user = await window.__fbAuth.signUp(email, pass);
            const teamCode = generateTeamCode();
            await window.__fb.setUserMeta(user.uid, {teamCode, email, ownerUid: user.uid});
            await window.__fb.setWorkspaceData(teamCode, {ownerUid: user.uid});
            await routeAuthenticatedUser(user); // shows the verify gate immediately
          } else {
            const user = await window.__fbAuth.signIn(email, pass);
            await routeAuthenticatedUser(user);
          }
        } catch(e){
          console.error(e);
          let msg = 'Something went wrong. Please try again.';
          if (e.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
          else if (e.code === 'auth/invalid-email') msg = 'Enter a valid email address.';
          else if (e.code === 'auth/weak-password') msg = 'Password must be at least 8 characters.';
          else if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') msg = 'Incorrect email or password.';
          else if (e.code === 'auth/user-not-found') msg = 'No account found with this email.';
          else if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Please wait and try again.';
          errEl.textContent = msg;
          errEl.style.display = 'block';
        }
        submitBtn.disabled = false;
      };
      modal.querySelector('#au_submit').addEventListener('click', submit);
      modal.querySelector('#au_pass').addEventListener('keydown', (e)=>{ if(e.key==='Enter') submit(); });
    }
    renderForm();
  }

  function openVerifyGate(){
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:30;';
    const email = currentUser ? currentUser.email : '';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:380px; color:var(--text-primary); text-align:center;">
        <i class="ti ti-mail" aria-hidden="true" style="font-size:32px; color:var(--accent); margin-bottom:8px; display:inline-block;"></i>
        <h2 style="margin:0 0 0.75rem;">Verify your email</h2>
        <p style="font-size:13px; color:var(--text-secondary); margin:0 0 1.25rem;">We sent a verification link to<br><strong style="color:var(--text-primary);">${escapeHtml(email)}</strong>. Click the link, then come back here.</p>
        <p id="vg_err" style="font-size:13px; color:var(--red); margin:0 0 0.75rem; display:none;"></p>
        <p id="vg_ok" style="font-size:13px; color:var(--green); margin:0 0 0.75rem; display:none;"></p>
        <div style="display:flex; flex-direction:column; gap:8px;">
          <button id="vg_check" class="accentBtn">I've verified — continue</button>
          <button id="vg_resend">Resend verification email</button>
          <button id="vg_logout">Use a different account</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);

    modal.querySelector('#vg_check').addEventListener('click', async ()=>{
      const user = await window.__fbAuth.reloadUser();
      if (user && user.emailVerified){
        modal.remove();
        // re-trigger the auth flow now that they're verified
        currentUser = user;
        window.location.reload();
      } else {
        modal.querySelector('#vg_err').textContent = "Still not verified — check your inbox (and spam folder) and click the link first.";
        modal.querySelector('#vg_err').style.display = 'block';
      }
    });
    modal.querySelector('#vg_resend').addEventListener('click', async ()=>{
      try {
        await window.__fbAuth.resendVerification();
        modal.querySelector('#vg_ok').textContent = 'Verification email sent again.';
        modal.querySelector('#vg_ok').style.display = 'block';
        modal.querySelector('#vg_err').style.display = 'none';
      } catch(e){
        modal.querySelector('#vg_err').textContent = 'Could not resend right now — please wait a moment and try again.';
        modal.querySelector('#vg_err').style.display = 'block';
      }
    });
    modal.querySelector('#vg_logout').addEventListener('click', async ()=>{
      await window.__fbAuth.signOut();
    });
  }

  function requireLogin(){
    return !!currentUser; // gate already enforces sign-in for the whole app
  }

  function salesMetrics(){
    const count = sales.length;
    const soldSales = sales.filter(s=>isSold(s));
    const revenue = soldSales.reduce((s,x)=>s+Number(x.soldPrice||0),0);
    const taxTotal = soldSales.reduce((s,x)=>s+Number(x.tax||0),0);
    const profit = soldSales.reduce((s,x)=>{
      const car = carByRego(x.rego);
      const cost = car? Number(car.cost||0) : 0;
      return s + (Number(x.soldPrice||0) - cost - Number(x.tax||0));
    },0);
    return {count, revenue, taxTotal, profit};
  }

  function carsMetrics(){
    const onHand = cars.filter(c=>!carIsSold(c.rego));
    const onHandCount = onHand.length;
    const onHandCost = onHand.reduce((s,c)=>s+Number(c.cost||0),0);
    const potentialProfit = onHandCost*0.2;
    const soldCount = cars.filter(c=>carIsSold(c.rego)).length;
    return {onHandCount, onHandCost, potentialProfit, soldCount};
  }

  function metricCardsHtml(items){
    return items.map(([label,val,color])=>`
      <div class="metricCard">
        <p style="font-size:13px; color:var(--text-secondary); margin:0 0 4px;">${label}</p>
        <p style="font-size:26px; font-weight:500; margin:0; ${color?('color:'+color+';'):''}">${val}</p>
      </div>`).join('');
  }

  function carCardHtml(c){
    const sold = carIsSold(c.rego);
    return `<div class="itemCard carCard" data-rego="${escapeHtml(c.rego)}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px;">
        <p style="font-weight:500; margin:0;">${escapeHtml(carLabel(c)||'(no make/model)')}</p>
        ${sold ? '<span class="c-green" style="font-size:11px; padding:2px 8px; border-radius:6px; flex-shrink:0;">Sold</span>' : '<span class="c-gray" style="font-size:11px; padding:2px 8px; border-radius:6px; flex-shrink:0;">On hand</span>'}
      </div>

    </div>`;
  }

  function saleCardHtml(s){
    const car = carByRego(s.rego);
    const cost = car? Number(car.cost||0) : 0;
    const sold = isSold(s);
    const profit = sold ? (Number(s.soldPrice||0) - cost - Number(s.tax||0)) : null;
    return `<div class="itemCard saleCard" data-id="${s.id}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px;">
        <p style="font-weight:500; margin:0;">${escapeHtml(car?carLabel(car):s.rego)}</p>
        <span style="font-size:12px; color:var(--text-tertiary); flex-shrink:0;">${s.date||''}</span>
      </div>
      <p style="font-size:13px; color:var(--text-secondary); margin:0 0 10px;">${escapeHtml(s.rego)} · ${escapeHtml(s.buyer||'No buyer set')}</p>
      <p style="font-size:13px; margin:0; display:flex; justify-content:space-between;"><span style="color:var(--text-secondary);">Sold price</span><span style="font-weight:500;">${fmt(s.soldPrice)}</span></p>
      <p style="font-size:13px; margin:4px 0 0; display:flex; justify-content:space-between;"><span style="color:var(--text-secondary);">Profit</span><span style="${profit!==null?('color:'+(profit>=0?'var(--green)':'var(--red)')+';font-weight:500;'):''}">${profit!==null?fmt(profit):'—'}</span></p>
      <div style="display:flex; gap:6px; margin-top:10px;">
        ${s.cif?'<span class="c-green" style="font-size:11px; padding:2px 8px; border-radius:6px;">CIF</span>':'<span class="c-gray" style="font-size:11px; padding:2px 8px; border-radius:6px;">CIF</span>'}
        ${s.sa?'<span class="c-green" style="font-size:11px; padding:2px 8px; border-radius:6px;">SA</span>':'<span class="c-gray" style="font-size:11px; padding:2px 8px; border-radius:6px;">SA</span>'}
      </div>
    </div>`;
  }

  function renderDashboard(){
    const sm = salesMetrics();
    const cm = carsMetrics();
    document.getElementById('dashMetrics').innerHTML = metricCardsHtml([
      ['On-hand cars', cm.onHandCount],
      ['Cars sold', cm.soldCount],
      ['Revenue', fmt(sm.revenue)],
      ['Net profit', fmt(sm.profit), sm.profit>=0?'var(--green)':'var(--red)']
    ]);

    const onHandCars = cars.filter(c=>!carIsSold(c.rego)).slice(0,4);
    document.getElementById('dashCarCards').innerHTML = onHandCars.map(carCardHtml).join('');
    document.getElementById('dashCarsEmpty').style.display = onHandCars.length ? 'none' : 'block';

    const recentSales = [...sales].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,4);
    document.getElementById('dashSaleCards').innerHTML = recentSales.map(saleCardHtml).join('');
    document.getElementById('dashSalesEmpty').style.display = recentSales.length ? 'none' : 'block';
  }

  function renderCarsPage(){
    const cm = carsMetrics();
    document.getElementById('carMetrics').innerHTML = metricCardsHtml([
      ['On-hand cars', cm.onHandCount],
      ['Total cost (on hand)', fmt(cm.onHandCost)],
      ['Potential profit (+20%)', fmt(cm.potentialProfit)],
      ['Cars sold', cm.soldCount]
    ]);
    const sorted = [...cars].sort((a,b)=>(a.rego||'').localeCompare(b.rego||''));
    document.getElementById('carCards').innerHTML = sorted.map(carCardHtml).join('');
    document.getElementById('carsEmpty').style.display = sorted.length ? 'none' : 'block';
  }

  function renderSalesPage(){
    const sm = salesMetrics();
    document.getElementById('saleMetrics').innerHTML = metricCardsHtml([
      ['Total sales', sm.count],
      ['Revenue', fmt(sm.revenue)],
      ['Tax owing', fmt(sm.taxTotal)],
      ['Net profit', fmt(sm.profit), sm.profit>=0?'var(--green)':'var(--red)']
    ]);
    const sorted = [...sales].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    document.getElementById('saleCards').innerHTML = sorted.map(saleCardHtml).join('');
    document.getElementById('salesEmpty').style.display = sorted.length ? 'none' : 'block';
  }

  function attachCardListeners(){
    document.querySelectorAll('.carCard').forEach(card=>{
      card.addEventListener('click', ()=> openCarDetailModal(card.dataset.rego));
    });
    document.querySelectorAll('.saleCard').forEach(card=>{
      card.addEventListener('click', ()=> openSaleDetailModal(card.dataset.id));
    });
  }

  function render(){
    renderDashboard();
    renderCarsPage();
    renderSalesPage();
    attachCardListeners();
  }

    document.getElementById('carsPage').style.display = page==='cars' ? 'block' : 'none';
    document.getElementById('salesPage').style.display = page==='sales' ? 'block' : 'none';
    document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('active'));
    document.getElementById('nav'+page.charAt(0).toUpperCase()+page.slice(1)).classList.add('active');

  document.getElementById('navCars').addEventListener('click', ()=>switchPage('cars'));

  document.getElementById('dashSeeCars').addEventListener('click', ()=>switchPage('cars'));
  document.getElementById('dashSeeSales').addEventListener('click', ()=>switchPage('sales'));

      if (!requireLogin()) return;
      cars = cars.filter(x=>x.rego!==c.rego);

        render();
        modal.remove();
        openCarDetailModal(c.rego);

  function openExpenseFormModal(car, parentModal){
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:20;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:360px; color:var(--text-primary);">
        <h2 style="margin:0 0 1rem;">Add expense</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <label style="font-size:13px; color:var(--text-secondary);">Description
            <input type="text" id="ef_label" placeholder="e.g. New tyres" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Date
            <input type="date" id="ef_date" value="${todayStr()}" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Amount
            <input type="number" id="ef_amount" min="0" step="0.01" value="0" style="width:100%; margin-top:4px;" />
          </label>
          <p id="ef_err" style="font-size:13px; color:var(--red); margin:0; display:none;"></p>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          <button id="ef_cancel">Cancel</button>
          <button id="ef_save" class="accentBtn">Add</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#ef_cancel').addEventListener('click', ()=>modal.remove());
    modal.querySelector('#ef_save').addEventListener('click', ()=>{
      const label = modal.querySelector('#ef_label').value.trim();
      const date = modal.querySelector('#ef_date').value;
      const amount = parseFloat(modal.querySelector('#ef_amount').value)||0;
      const errEl = modal.querySelector('#ef_err');
      if (!label){ errEl.textContent='Enter a description.'; errEl.style.display='block'; return; }
      const liveCar = carByRego(car.rego);
      if (!liveCar.expenses) liveCar.expenses=[];
      liveCar.expenses.push({id:newId(), label, date, amount, addedBy: currentUser?currentUser.email:null});
      persist();
      render();
      modal.remove();
      if (parentModal) parentModal.remove();
      openCarDetailModal(car.rego);
    });
  }

  function openCarFormModal(existing){
    const isEdit = !!existing;
    const c = existing || {rego:'', make:'', model:'', cost:0, regoDate:todayStr(), regoExpiry:'', warrantExpiry:''};
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:10; overflow-y:auto;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:420px; margin:auto; color:var(--text-primary);">
        <h2 style="margin:0 0 1rem;">${isEdit?'Edit car':'Add car'}</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <label style="font-size:13px; color:var(--text-secondary);">Registration number
            <input type="text" id="cf_rego" value="${escapeHtml(c.rego)}" placeholder="e.g. ABC123" style="width:100%; margin-top:4px; text-transform:uppercase;" ${isEdit?'disabled':''} />
          </label>
          <div style="display:flex; gap:12px;">
            <label style="font-size:13px; color:var(--text-secondary); flex:1;">Make
              <input type="text" id="cf_make" value="${escapeHtml(c.make||'')}" placeholder="e.g. Toyota" style="width:100%; margin-top:4px;" />
            </label>
            <label style="font-size:13px; color:var(--text-secondary); flex:1;">Model
              <input type="text" id="cf_model" value="${escapeHtml(c.model||'')}" placeholder="e.g. Corolla" style="width:100%; margin-top:4px;" />
            </label>
          </div>
          <label style="font-size:13px; color:var(--text-secondary);">Cost (what you paid)
            <input type="number" id="cf_cost" value="${c.cost||0}" min="0" step="0.01" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Date bought (rego)
            <input type="date" id="cf_regoDate" value="${c.regoDate}" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Rego expiry date
            <input type="date" id="cf_regoExpiry" value="${c.regoExpiry||''}" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Warrant (WOF) end date
            <input type="date" id="cf_warrant" value="${c.warrantExpiry}" style="width:100%; margin-top:4px;" />
          </label>
          <p id="cf_err" style="font-size:13px; color:var(--red); margin:0; display:none;"></p>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          <button id="cf_cancel">Cancel</button>
          <button id="cf_save" class="accentBtn">${isEdit?'Save':'Add'}</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#cf_cancel').addEventListener('click', ()=>modal.remove());
    modal.querySelector('#cf_save').addEventListener('click', ()=>{
      const rego = modal.querySelector('#cf_rego').value.trim().toUpperCase();
      const make = modal.querySelector('#cf_make').value.trim();
      const model = modal.querySelector('#cf_model').value.trim();
      const cost = parseFloat(modal.querySelector('#cf_cost').value)||0;
      const regoDate = modal.querySelector('#cf_regoDate').value;
      const regoExpiry = modal.querySelector('#cf_regoExpiry').value;
      const warrantExpiry = modal.querySelector('#cf_warrant').value;
      const errEl = modal.querySelector('#cf_err');
      if (!rego || !make){ errEl.textContent='Registration number and make are required.'; errEl.style.display='block'; return; }
      if (!isEdit && carByRego(rego)){ errEl.textContent='A car with this registration already exists.'; errEl.style.display='block'; return; }

      if (isEdit){
        const idx = cars.findIndex(x=>x.rego===c.rego);
        if (idx>-1) cars[idx] = {...cars[idx], make, model, cost, regoDate, regoExpiry, warrantExpiry, editedBy: currentUser?currentUser.email:null};
      } else {
        cars.push({rego, make, model, cost, regoDate, regoExpiry, warrantExpiry, expenses:[], addedBy: currentUser?currentUser.email:null});
      }
      persist();
      render();
      modal.remove();
    });
  }

  function openConfirmModal(message, onConfirm){
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:40;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:360px; color:var(--text-primary);">
        <p style="margin:0 0 1.25rem; font-size:14px;">${message}</p>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button id="cm_cancel">Go back</button>
          <button id="cm_confirm" class="accentBtn">Continue</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#cm_cancel').addEventListener('click', ()=>modal.remove());
    modal.querySelector('#cm_confirm').addEventListener('click', ()=>{
      modal.remove();
      onConfirm();
    });
  }

  function openSaleDetailModal(saleId){
    const s = sales.find(x=>x.id===saleId);
    if (!s) return;
    const car = carByRego(s.rego);
    const cost = car? Number(car.cost||0) : 0;
    const sold = isSold(s);
    const profit = sold ? (Number(s.soldPrice||0) - cost - Number(s.tax||0)) : null;
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:10; overflow-y:auto;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:440px; margin:auto; color:var(--text-primary);">
        <h2 style="margin:0 0 1rem;">${escapeHtml(car?carLabel(car):s.rego)}</h2>
        <table style="width:100%; font-size:13px; margin-bottom:1rem;">
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Rego</td><td style="text-align:right; padding:6px 0; font-weight:500; cursor:${car?'pointer':'default'}; ${car?'color:var(--accent);':''}" id="sd_regoLink">${escapeHtml(s.rego)}</td></tr>
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Date</td><td style="text-align:right; padding:6px 0;">${s.date||'—'}</td></tr>
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Buyer</td><td style="text-align:right; padding:6px 0;">${escapeHtml(s.buyer||'—')}</td></tr>
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Cost</td><td style="text-align:right; padding:6px 0;">${fmt(cost)}</td></tr>
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Tax</td><td style="text-align:right; padding:6px 0;">${fmt(s.tax)}</td></tr>
          <tr><td style="color:var(--text-secondary); padding:6px 0;">Profit</td><td style="text-align:right; padding:6px 0; ${profit!==null?('color:'+(profit>=0?'var(--green)':'var(--red)')+';font-weight:500;'):''}">${profit!==null?fmt(profit):'—'}</td></tr>
        </table>
        <label style="font-size:13px; color:var(--text-secondary); display:block; margin-bottom:1rem;">Sold price
          <input type="number" id="sd_soldPrice" value="${s.soldPrice||0}" min="0" step="0.01" style="width:100%; margin-top:4px;" />
        </label>
        <div style="display:flex; gap:24px; margin-bottom:1rem;">
          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);" title="Paperwork/file received">
            <input type="checkbox" id="sd_cif" ${s.cif?'checked':''} /> CIF
          </label>
          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);" title="Sale agreement signed">
            <input type="checkbox" id="sd_sa" ${s.sa?'checked':''} /> SA
          </label>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:1rem;">
          <button id="sd_cifPhoto" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px;"><i class="ti ti-photo" aria-hidden="true" style="font-size:15px;"></i>CIF photo${s.cifImage?' ✓':''}</button>
          <button id="sd_saPhoto" style="flex:1; display:flex; align-items:center; justify-content:center; gap:6px;"><i class="ti ti-photo" aria-hidden="true" style="font-size:15px;"></i>SA photo${s.saImage?' ✓':''}</button>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          <button id="sd_delete" class="dangerText">Delete sale</button>
          <button id="sd_edit">Edit</button>
          <button id="sd_close" class="accentBtn">Close</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');

    if (car){
      modal.querySelector('#sd_regoLink').addEventListener('click', ()=>{ modal.remove(); openCarDetailModal(car.rego); });
    }
    modal.querySelector('#sd_close').addEventListener('click', ()=>modal.remove());
    modal.querySelector('#sd_edit').addEventListener('click', ()=>{
      if (!requireLogin()) return;
      modal.remove();
      openSaleFormModal(s);
    });
    modal.querySelector('#sd_delete').addEventListener('click', ()=>{
      if (!requireLogin()) return;
      sales = sales.filter(x=>x.id!==s.id);
      persist();
      render();
      modal.remove();
    });
    modal.querySelector('#sd_soldPrice').addEventListener('change', (e)=>{
      if (!requireLogin()) return;
      s.soldPrice = parseFloat(e.target.value)||0;
      s.tax = Math.round(s.soldPrice*taxRate/100*100)/100;
      persist();
      render();
    });
    modal.querySelector('#sd_cif').addEventListener('change', (e)=>{
      if (!requireLogin()){ e.target.checked=!e.target.checked; return; }
      s.cif = e.target.checked; persist(); render();
    });
    modal.querySelector('#sd_sa').addEventListener('change', (e)=>{
      if (!requireLogin()){ e.target.checked=!e.target.checked; return; }
      s.sa = e.target.checked; persist(); render();
    });
    modal.querySelector('#sd_cifPhoto').addEventListener('click', ()=>{
      if (!requireLogin()) return;
      openImageModal(s.id, 'cifImage', modal);
    });
    modal.querySelector('#sd_saPhoto').addEventListener('click', ()=>{
      if (!requireLogin()) return;
      openImageModal(s.id, 'saImage', modal);
    });
  }

  function openSaleFormModal(existing){
    const isEdit = !!existing;
    const s = existing || {id:'', date:todayStr(), rego:'', buyer:'', soldPrice:0, cif:false, sa:false};
    if (!cars.length){
      const modal = document.createElement('div');
      modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:10;';
      modal.innerHTML = `<div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:360px; color:var(--text-primary);">
        <p style="margin:0 0 1rem;">Add a car first before recording a sale.</p>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button id="goCars">Go to cars</button>
          <button id="ok">OK</button>
        </div>
      </div>`;
      document.getElementById('modalRoot').appendChild(modal);
      setupBackdropClose(modal, '.modalPanel');
      modal.querySelector('#ok').addEventListener('click', ()=>modal.remove());
      modal.querySelector('#goCars').addEventListener('click', ()=>{ modal.remove(); switchPage('cars'); });
      return;
    }
    const carOptions = cars.map(c=>`<option value="${escapeHtml(c.rego)}" ${s.rego===c.rego?'selected':''}>${escapeHtml(c.rego)} — ${escapeHtml(carLabel(c))}</option>`).join('');
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:10; overflow-y:auto;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:420px; margin:auto; color:var(--text-primary);">
        <h2 style="margin:0 0 1rem;">${isEdit?'Edit sale':'Add sale'}</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <label style="font-size:13px; color:var(--text-secondary);">Car
            <select id="sf_rego" style="width:100%; margin-top:4px;">${carOptions}</select>
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Date
            <input type="date" id="sf_date" value="${s.date}" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Buyer
            <input type="text" id="sf_buyer" value="${escapeHtml(s.buyer)}" placeholder="Customer name" style="width:100%; margin-top:4px;" />
          </label>
          <label style="font-size:13px; color:var(--text-secondary);">Sold price
            <input type="number" id="sf_soldPrice" value="${s.soldPrice||0}" min="0" step="0.01" style="width:100%; margin-top:4px;" />
          </label>
          <p style="font-size:12px; color:var(--text-tertiary); margin:0;">Tax owing (at ${taxRate}%): <span id="sf_taxPreview" style="font-weight:500; color:var(--text-primary);">${fmt((s.soldPrice||0)*taxRate/100)}</span></p>
          <div style="display:flex; gap:16px; padding-top:4px;">
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);" title="Paperwork/file received">
              <input type="checkbox" id="sf_cif" ${s.cif?'checked':''} />
              CIF
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);" title="Sale agreement signed">
              <input type="checkbox" id="sf_sa" ${s.sa?'checked':''} />
              SA
            </label>
          </div>
          <p id="sf_err" style="font-size:13px; color:var(--red); margin:0; display:none;"></p>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          <button id="sf_cancel">Cancel</button>
          <button id="sf_save" class="accentBtn">${isEdit?'Save':'Add'}</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');

    const soldPriceInput = modal.querySelector('#sf_soldPrice');
    const taxPreview = modal.querySelector('#sf_taxPreview');
    soldPriceInput.addEventListener('input', ()=>{ taxPreview.textContent = fmt((parseFloat(soldPriceInput.value)||0)*taxRate/100); });

    modal.querySelector('#sf_cancel').addEventListener('click', ()=>modal.remove());

    function doSave(){
      const rego = modal.querySelector('#sf_rego').value;
      const date = modal.querySelector('#sf_date').value;
      const buyer = modal.querySelector('#sf_buyer').value.trim();
      const soldPrice = parseFloat(soldPriceInput.value)||0;
      const tax = Math.round(soldPrice*taxRate/100*100)/100;
      const cif = modal.querySelector('#sf_cif').checked;
      const sa = modal.querySelector('#sf_sa').checked;

      if (isEdit){
        const idx = sales.findIndex(x=>x.id===s.id);
        if (idx>-1) sales[idx] = {...sales[idx], rego, date, buyer, soldPrice, tax, cif, sa, editedBy: currentUser?currentUser.email:null};
      } else {
        sales.push({id: newId(), rego, date, buyer, soldPrice, tax, cif, sa, cifImage:'', saImage:'', addedBy: currentUser?currentUser.email:null});
      }
      persist();
      render();
      modal.remove();
    }

    modal.querySelector('#sf_save').addEventListener('click', ()=>{
      const cif = modal.querySelector('#sf_cif').checked;
      const sa = modal.querySelector('#sf_sa').checked;
      if (!cif || !sa){
        const missing = [!cif?'CIF':null, !sa?'SA':null].filter(Boolean).join(' and ');
        openConfirmModal(`${missing} ${missing.includes('and')?'are':'is'} not ticked. Are you sure you want to continue?`, doSave);
      } else {
        doSave();
      }
    });
  }

  function openImageModal(saleId, field, returnToModal){
    const s = sales.find(x=>x.id===saleId);
    if (!s) return;
    const existingImg = s[field];
    const title = field==='cifImage' ? 'CIF photo' : 'SA photo';
    const modal = document.createElement('div');
    modal.style.cssText = 'min-height:100vh; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center; position:fixed; inset:0; padding:1rem; z-index:25;';
    modal.innerHTML = `
      <div class="modalPanel" style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border); padding:1.5rem; width:100%; max-width:380px; color:var(--text-primary);">
        <h2 style="margin:0 0 1rem;">${title}</h2>
        <div id="imgPreviewWrap" style="margin-bottom:12px;">
          ${existingImg ? `<img src="${existingImg}" style="width:100%; border-radius:8px; max-height:240px; object-fit:contain; background:var(--bg);" />` : '<p style="font-size:13px; color:var(--text-secondary);">No photo uploaded yet.</p>'}
        </div>
        <input type="file" id="imgFile" accept="image/*" style="width:100%; font-size:13px;" />
        <p id="img_err" style="font-size:13px; color:var(--red); margin:8px 0 0; display:none;"></p>
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem;">
          ${existingImg ? '<button id="img_remove" class="dangerText">Remove</button>' : ''}
          <button id="img_close">Close</button>
        </div>
      </div>`;
    document.getElementById('modalRoot').appendChild(modal);
    setupBackdropClose(modal, '.modalPanel');
    modal.querySelector('#img_close').addEventListener('click', ()=>{ modal.remove(); render(); });

    modal.querySelector('#imgFile').addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 700*1024){
        modal.querySelector('#img_err').textContent = 'Image too large (max ~700KB).';
        modal.querySelector('#img_err').style.display='block';
        return;
      }
      const reader = new FileReader();
      reader.onload = ()=>{
        const live = sales.find(x=>x.id===saleId);
        live[field] = reader.result;
        persist();
        modal.querySelector('#imgPreviewWrap').innerHTML = `<img src="${reader.result}" style="width:100%; border-radius:8px; max-height:240px; object-fit:contain; background:var(--bg);" />`;
      };
      reader.readAsDataURL(file);
    });

    const removeBtn = modal.querySelector('#img_remove');
    if (removeBtn){
      removeBtn.addEventListener('click', ()=>{
        const live = sales.find(x=>x.id===saleId);
        live[field]='';
        persist();
        modal.remove();
        render();
      });
    }
  }

  document.getElementById('addCarBtn').addEventListener('click', ()=>{ if(requireLogin()) openCarFormModal(null); });
  document.getElementById('addSaleBtn').addEventListener('click', ()=>{ if(requireLogin()) openSaleFormModal(null); });

  const taxRateInput = document.getElementById('taxRate');
  let rateTimer;
  taxRateInput.addEventListener('input', ()=>{
    taxRate = parseFloat(taxRateInput.value)||0;
    clearTimeout(rateTimer);
    rateTimer = setTimeout(()=>{ persist(); render(); }, 400);
  });

  load();
})();
</script>
</body>
</html>
